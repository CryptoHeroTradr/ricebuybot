name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # ffprobe is a HARD dependency of the media pool generator: it is what tells an
      # animation from a video, and Telegram treats those differently. Without it every
      # file is skipped and the manifest comes out empty.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: pnpm install --frozen-lockfile
      - run: nproc
      - run: pnpm test
