# /etc/nginx/snippets/ricebuybot-media.conf
#
# The shared rice media pool — Phase 5a. Served READ-ONLY, straight off disk by
# nginx. Next never sees these requests: no basePath, no image optimizer, no
# asset() helper, no rebuild to add a meme. That is the entire point.
#
# PURELY ADDITIVE. Include this inside the `server { }` block of a vhost and no
# existing route changes: nginx matches the longest prefix, and neither
# onegrainofrice nor RiceDAO has a /media route, a public/media/ directory, or
# any code that references /media/.
#
#   include snippets/ricebuybot-media.conf;
#
# THE SINGLE-MINT ALIAS IS CORRECT, NOT A LIMITATION. Do not "fix" it into a map
# keyed on the mint. Other tenants never need an HTTP URL at all: the bot reads
# its pool from local disk (MEDIA_SOURCE=local), and only $RICE has websites that
# consume a manifest. A map would take a path that is currently a constant and
# make it attacker-influenced — a mint is user-supplied config — in exchange for
# serving nobody. A second tenant that genuinely needs a public pool gets a second
# snippet, and that is a one-line file.
#
# ---------------------------------------------------------------------------
# THE MANIFEST AND THE MEDIA NEED OPPOSITE CACHE RULES. They used to share one
# `max-age=3600`, which was wrong in both directions:
#
#   manifest.json  is the MUTABLE INDEX. A one-hour cache means a curator adds a
#                  meme, the bot starts posting it within 60 seconds, and the
#                  website carousel does not show it for an HOUR — breaking the
#                  exact loop the DM curation flow exists to make instant.
#                  -> no-cache: always revalidate. nginx answers with an ETag, so
#                     the steady state is a 304 with no body. Cheap.
#
#   media files    are CONTENT-ADDRESSED (`<sha256>.<ext>`, enforced by both
#                  tier.ts and build-manifest.ts). A URL can never come to mean
#                  different bytes — a re-tier is a move, an edit is a new file
#                  with a new name. So a year is not a risk, it is the truth.
#                  An hour was leaving performance on the floor for nothing.
# ---------------------------------------------------------------------------

# The mutable index. Exact match, so it wins over the prefix block below
# regardless of order (nginx tries `=` locations first).
location = /media/manifest.json {
    alias /srv/media/2wQq3MrFFHPQnapMt1wnZ2vGkVZDv5ENDCrdLCqFpump/manifest.json;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
}

location ^~ /media/ {
    alias /srv/media/2wQq3MrFFHPQnapMt1wnZ2vGkVZDv5ENDCrdLCqFpump/;

    # Deny the folders that are not for the public, BEFORE serving anything.
    #
    #   _archive  lives INSIDE the alias. A meme an admin retired would otherwise
    #             still be one URL away — the archive exists so an operator can
    #             recover it, not so the internet can.
    #   _incoming is outside the alias entirely, so it is already unreachable.
    #             Denied here anyway: the day someone moves the drop zone under
    #             the mint folder, this line is what stops it being served.
    #   dotfiles  are in-flight atomic writes (.manifest.json.<pid>.tmp). A client
    #             must never see a half-written manifest, so it must never be able
    #             to ask for one.
    location ~ ^/media/(_|\.|.*/\.) {
        # NOT the parent's max-age. Without this the 404 inherits `immutable, 1y`
        # and a client caches "this does not exist" for a year — on a path that may
        # legitimately exist later (a meme restored out of _archive is the whole
        # reason _archive is not an `rm`).
        add_header Cache-Control "no-store" always;
        return 404;
    }

    # No directory listing. The manifest is the index; the folder is not.
    autoindex off;

    # Safe ONLY because the filename is the content hash. See the block comment.
    #
    # NOTE THE ABSENCE OF `always`. With it, nginx puts this header on EVERY
    # response including errors — so a 404 for a file that is missing right now
    # (mid-curation, a typo, a client racing the manifest) is cached by the
    # browser as "this does not exist" for a YEAR, on a path that will exist the
    # moment the file lands. Without `always`, nginx applies it only to 2xx/3xx,
    # which is exactly the set of responses whose bytes are actually immutable.
    # Same trap as the deny block's no-store, one location further out.
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;

    # NO `try_files` here. `alias` already 404s a file that is not on disk, so it
    # bought nothing — and `alias` + `try_files` is nginx's one genuinely fragile
    # combination (trac #97, open since 2011: $uri is resolved against the wrong
    # root beyond the simplest case). It worked, which is precisely why nobody
    # would have noticed when it stopped.
}
